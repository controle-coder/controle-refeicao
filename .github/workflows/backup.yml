name: Backup diário do banco

on:
  schedule:
    # Todo dia às 03:00 UTC (00:00 horário de Brasília)
    - cron: '0 3 * * *'
  workflow_dispatch: # permite rodar manualmente pelo GitHub

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Instalar PostgreSQL 17 client
        # O servidor Neon roda PostgreSQL 17; o pg_dump precisa ser >= a versão do servidor.
        # O postgresql-client padrão do Ubuntu é o 16, que falha com "server version mismatch".
        # Por isso instalamos o cliente 17 do repositório oficial PGDG.
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq curl ca-certificates lsb-release
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -fsSL -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc https://www.postgresql.org/media/keys/ACCC4CF8.asc
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client-17
          # O runner já traz o client 16, e o wrapper /usr/bin/pg_dump continua
          # apontando para ele. Por isso usamos o binário 17 pelo caminho absoluto.
          /usr/lib/postgresql/17/bin/pg_dump --version

      - name: Gerar backup via pg_dump
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "ERRO: secret DATABASE_URL não está configurado no repositório."
            echo "Configure em: Settings → Secrets and variables → Actions → New repository secret"
            exit 1
          fi
          TIMESTAMP=$(date +"%Y-%m-%d_%H-%M-%S")
          FILENAME="backup_${TIMESTAMP}.sql"
          /usr/lib/postgresql/17/bin/pg_dump "$DATABASE_URL" \
            --no-owner \
            --no-privileges \
            --clean \
            --if-exists \
            --format=plain \
            > "$FILENAME"
          echo "FILENAME=$FILENAME" >> "$GITHUB_ENV"
          echo "Backup gerado: $FILENAME ($(wc -c < "$FILENAME") bytes)"

      - name: Upload backup como artifact
        uses: actions/upload-artifact@v4
        with:
          name: backup-${{ env.FILENAME }}
          path: ${{ env.FILENAME }}
          retention-days: 30
